<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGradient)"/>
  
  <!-- Clock ticks -->
  <g stroke="rgba(255,255,255,0.3)" stroke-width="4" stroke-linecap="round">
    <line x1="256" y1="40" x2="256" y2="60"/>
    <line x1="256" y1="452" x2="256" y2="472"/>
    <line x1="40" y1="256" x2="60" y2="256"/>
    <line x1="452" y1="256" x2="472" y2="256"/>
    <line x1="112" y1="112" x2="126" y2="126"/>
    <line x1="386" y1="386" x2="400" y2="400"/>
    <line x1="400" y1="112" x2="386" y2="126"/>
    <line x1="126" y1="386" x2="112" y2="400"/>
  </g>
  
  <!-- Double T Lettermark -->
  <g fill="white">
    <!-- First T -->
    <rect x="166" y="140" width="80" height="20" rx="4"/>
    <rect x="196" y="140" width="20" height="180" rx="4"/>
    
    <!-- Second T (slightly offset and smaller) -->
    <rect x="246" y="170" width="80" height="20" rx="4"/>
    <rect x="276" y="170" width="20" height="150" rx="4"/>
  </g>
  
  <!-- Digital tokens/coins -->
  <circle cx="340" cy="140" r="18" fill="url(#accentGradient)" filter="url(#glow)"/>
  <circle cx="370" cy="180" r="12" fill="url(#accentGradient)" opacity="0.8"/>
  <circle cx="150" cy="340" r="14" fill="url(#accentGradient)" opacity="0.9"/>
  <circle cx="380" cy="320" r="10" fill="url(#accentGradient)" opacity="0.7"/>
  
  <!-- Clock hands -->
  <g stroke="white" stroke-width="8" stroke-linecap="round">
    <line x1="256" y1="256" x2="256" y2="160"/>
    <line x1="256" y1="256" x2="320" y2="256"/>
  </g>
  
  <!-- Center dot -->
  <circle cx="256" cy="256" r="12" fill="url(#accentGradient)"/>
</svg>