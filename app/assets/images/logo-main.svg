<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 80">
  <defs>
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="tokenGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
  </defs>
  
  <!-- Icon Group -->
  <g transform="translate(8, 8)">
    <!-- Background circle -->
    <circle cx="32" cy="32" r="30" fill="url(#iconGradient)"/>
    
    <!-- Clock ticks -->
    <g stroke="rgba(255,255,255,0.4)" stroke-width="2" stroke-linecap="round">
      <line x1="32" y1="8" x2="32" y2="12"/>
      <line x1="32" y1="52" x2="32" y2="56"/>
      <line x1="8" y1="32" x2="12" y2="32"/>
      <line x1="52" y1="32" x2="56" y2="32"/>
    </g>
    
    <!-- Double T Lettermark -->
    <g fill="white">
      <!-- First T -->
      <rect x="14" y="16" width="16" height="4" rx="1"/>
      <rect x="20" y="16" width="4" height="22" rx="1"/>
      
      <!-- Second T -->
      <rect x="30" y="22" width="16" height="4" rx="1"/>
      <rect x="36" y="22" width="4" height="16" rx="1"/>
    </g>
    
    <!-- Token accent -->
    <circle cx="50" cy="14" r="6" fill="url(#tokenGradient)"/>
    
    <!-- Clock hands -->
    <g stroke="white" stroke-width="3" stroke-linecap="round">
      <line x1="32" y1="32" x2="32" y2="20"/>
      <line x1="32" y1="32" x2="42" y2="32"/>
    </g>
    
    <!-- Center dot -->
    <circle cx="32" cy="32" r="4" fill="url(#tokenGradient)"/>
  </g>
  
  <!-- Text: TokenTime -->
  <text x="80" y="50" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="32" font-weight="700" fill="#f9fafb">TokenTime</text>
  
  <!-- Text: .ai -->
  <text x="244" y="50" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="32" font-weight="300" fill="#a78bfa">.ai</text>
</svg>