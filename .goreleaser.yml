version: 2

project_name: ttime

before:
  hooks:
    - go mod tidy

builds:
  - id: ttime
    main: ./cmd/ttime
    binary: ttime
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}

archives:
  - id: ttime
    ids:
      - ttime
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
    format_overrides:
      - goos: linux
        formats: [tar.gz]
      - goos: windows
        formats: [zip]

checksum:
  name_template: checksums.txt

changelog:
  use: github
  groups:
    - title: Features
      regexp: '^.*?feat(\(.+\))??!?:.+$'
      order: 0
    - title: Bug Fixes
      regexp: '^.*?fix(\(.+\))??!?:.+$'
      order: 1
    - title: Other
      order: 999

brews:
  - ids:
      - ttime
    name: ttime
    directory: Formula
    homepage: https://ttime.ai
    description: Local heartbeat daemon client for ttime.ai
    license: MIT
    repository:
      owner: tokentimeai
      name: homebrew-tap
      branch: main
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    commit_msg_template: "Brew formula update for {{ .ProjectName }} version {{ .Tag }}"
    install: |
      bin.install "ttime"
    service: |
      run [opt_bin/"ttime", "daemon"]
      keep_alive true
      working_dir var
    test: |
      system "#{bin}/ttime", "help"

release:
  github:
    owner: tokentimeai
    name: client
  draft: false
  prerelease: auto
  make_latest: true
